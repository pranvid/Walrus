      40% { transform:translateY(-5px); opacity:1; }

const GOALS = ["All", "Lead Generation", "Client Servicing", "Smooth Communications", "Live Demo"];
const INDUSTRIES = ["All Industries","Education","Automotive","Healthcare","Real Estate","Finance & Insurance","Finance & Banking","Professional Services","Manufacturing","Retail & Commerce","Travel & Hospitality","Events & Weddings","SaaS & Tech"];

function hueToColor(hue, l=52, c=0.14) { return `oklch(${l}% ${c} ${hue})`; }
function hueToBg(hue)     { return `oklch(95% 0.04 ${hue})`; }
function hueToBorder(hue) { return `oklch(88% 0.06 ${hue})`; }

// ─── Simulated Chat ───────────────────────────────────────────────────────────
const FOLLOW_UPS = {
  "Lead Generation":      ["Could you share your name and contact number so our team can get back to you?","That's great! Let me connect you with the right specialist. What's the best time to reach you?","I'd love to help with that. Can I ask a few quick questions to find the best fit for you?"],
  "Client Servicing":     ["I've noted your request. Can you share your registered email or account number so I can pull up your details?","I understand. Let me look that up for you — this will just take a moment.","Got it! I've flagged this for our team. You'll receive an update within 24 hours."],
  "Smooth Communications":["Happy to help! Could you give me a bit more detail so I can assist you better?","Sure thing. Let me check on that and get back to you right away.","Thanks for reaching out! I'll make sure the right person follows up with you shortly."],
  "Live Demo":            ["Great choice! I can put together a tailored demo for you. What's your main use case?","I'll generate a live presentation now. Any specific data points you'd like to highlight?","Perfect! Give me a moment — your live canvas is being created."],
};
function simulateReply(companion, userMessage, messageCount) {
  const msg = userMessage.toLowerCase();
  for (let i = 0; i < companion.sampleQ.length; i++) {
    const sq = companion.sampleQ[i].toLowerCase();
    if (msg.includes(sq.split(' ')[0]) || sq.includes(msg.split(' ')[0])) {
      const goalReplies = FOLLOW_UPS[companion.goal] || FOLLOW_UPS["Smooth Communications"];
      return goalReplies[i % goalReplies.length];
    }
  }
  const goalReplies = FOLLOW_UPS[companion.goal] || FOLLOW_UPS["Smooth Communications"];
  return goalReplies[messageCount % goalReplies.length];
}
async function simulateChat(companion, userMessage, messageCount) {
  await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
  return simulateReply(companion, userMessage, messageCount);
}

// ─── Website Preview Modal ────────────────────────────────────────────────────
function WebsitePreviewModal({ companion, onClose, onUse }) {
  const accent = hueToColor(companion.hue);
  const { agentName, siteTitle, siteSub, siteCTA, siteColor } = companion.preview;
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [started, setStarted] = useState(false);
  const [showCTA, setShowCTA] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (messages.length >= 3) setShowCTA(true);
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const startChat = () => {
    setStarted(true);
    setMessages([{ role:'assistant', text:`Hi! I'm ${agentName}. ${companion.desc.split('.')[0]}. How can I help you today?` }]);
  };
  const send = async (text) => {
    if (!text.trim() || loading) return;
    const newMessages = [...messages, { role:'user', text }];
    setMessages(newMessages);
    setInput('');
    setLoading(true);
    try {
      const reply = await simulateChat(companion, text, newMessages.length);
      setMessages(m => [...m, { role:'assistant', text:reply }]);
    } catch(e) {
      setMessages(m => [...m, { role:'assistant', text:"I'm having trouble right now. Please try again!" }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(8,12,24,0.75)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200, backdropFilter:'blur(8px)' }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ display:'flex', flexDirection:'column', gap:0, width:820, maxHeight:'90vh' }}>

        <div className="filter-bar-inner" style={{ display:'flex', alignItems:'center', gap:14, flexWrap:'wrap' }}>
          <div className="filter-chips" style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            {GOALS.map(g =>
              <button key={g} onClick={() => setGoal(g)}
                style={{ padding:'6px 14px', borderRadius:20, border:`1.5px solid ${goal===g?'#0A7E74':'#E2E2E0'}`, background:goal===g?'#0A7E74':'transparent', color:goal===g?'#fff':'#636369', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.14s' }}>
                {g}
              </button>
            )}
          </div>
          <div style={{ width:1, height:20, background:'#E2E2E0' }}></div>
          <select className="filter-industry" value={industry} onChange={e => setIndustry(e.target.value)}
            style={{ padding:'7px 12px', border:'1.5px solid #E2E2E0', borderRadius:9, fontSize:13, fontFamily:'inherit', outline:'none', color:'var(--c-text)', background:'#fff', cursor:'pointer' }}>
            {INDUSTRIES.map(i => <option key={i}>{i}</option>)}
          </select>
          <span style={{ fontSize:14, color:'var(--c-text-muted)', marginLeft:'auto', fontWeight:500 }}>{filtered.length} companions</span>
        </div>
      </div>

      {/* Grid */}
      <div id="companions-grid" style={{ padding:'var(--space-10) var(--page-pad) var(--space-16)' }}>
        <div className="card-grid" style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:16 }}>
          {filtered.map(c => {
            const accent = hueToColor(c.hue);
            const bg = hueToBg(c.hue);
            return (
              <div key={c.id}
                style={{ background:'#fff', borderRadius:14, border:'1.5px solid #E2E2E0', padding:'20px', cursor:'pointer', transition:'all 0.16s' }}
                onClick={() => setSelected(c)}
                onMouseEnter={e => { e.currentTarget.style.borderColor=accent; e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 6px 22px rgba(0,0,0,0.07)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor='#E2E2E0'; e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}>
                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:12 }}>
                  <div style={{ width:42, height:42, borderRadius:12, background:bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>{c.emoji}</div>
                  <span style={{ fontSize:11, background:bg, color:accent, padding:'3px 8px', borderRadius:20, fontWeight:700, border:`1px solid ${hueToBorder(c.hue)}` }}>{c.industry}</span>
                </div>
                <div style={{ fontWeight:700, fontSize:15, color:'var(--c-text)', marginBottom:5, letterSpacing:'-0.2px', lineHeight:1.3 }}>{c.name}</div>
                <div style={{ fontSize:14, color:'var(--c-text-muted)', lineHeight:1.55, marginBottom:16 }}>{c.shortDesc}</div>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span style={{ fontSize:12, color:'var(--c-text-muted)', display:'flex', alignItems:'center', gap:4 }}>
                    <span style={{ width:5, height:5, borderRadius:'50%', background:accent, display:'inline-block' }}></span>
                    {c.goal}
                  </span>
                  <button onClick={e => { e.stopPropagation(); setSelected(c); }}
                    style={{ fontSize:12, color:accent, background:bg, border:`1px solid ${hueToBorder(c.hue)}`, padding:'5px 12px', borderRadius:7, fontWeight:700, cursor:'pointer', fontFamily:'inherit', transition:'all 0.14s' }}
                    onMouseEnter={e => { e.currentTarget.style.background=accent; e.currentTarget.style.color='#fff'; e.currentTarget.style.borderColor=accent; }}
                    onMouseLeave={e => { e.currentTarget.style.background=bg; e.currentTarget.style.color=accent; e.currentTarget.style.borderColor=hueToBorder(c.hue); }}>
                    Preview →
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        {filtered.length === 0 &&
          <div style={{ textAlign:'center', padding:'60px 0', color:'var(--c-text-muted)' }}>
            <div style={{ fontSize:32, marginBottom:12 }}>🔍</div>
            <div style={{ fontWeight:600, fontSize:15, color:'var(--c-text-muted)' }}>No companions match these filters</div>
            <div style={{ fontSize:13, marginTop:4 }}>Try adjusting the goal or industry filter</div>
          </div>
        }
      </div>

      {selected && <WebsitePreviewModal companion={selected} onClose={() => setSelected(null)} onUse={() => { setSelected(null); onSignup(); }}/>}
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function Root() {
  const [page, setPage] = useState('home');
  const [showSignup, setShowSignup] = useState(false);
  const navigate = (p) => { setPage(p); window.scrollTo({top:0,behavior:'smooth'}); };

  return (
    <>
      {page === 'home'
        ? <HomePage onNavigate={navigate} onSignup={() => setShowSignup(true)}/>
        : <TryPage  onNavigate={navigate} onSignup={() => setShowSignup(true)}/>
      }
      {showSignup && <SignupModal onClose={() => setShowSignup(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
